name: Release

on:
  release:
    types: [published]

permissions:
  attestations: write
  artifact-metadata: write
  contents: read
  id-token: write

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: node tools/validate-release-context.js
      - run: npm ci
      - run: npm test
      - run: npm run pack:check
      - run: mkdir -p dist
      - run: npm pack --pack-destination dist --json > dist/npm-pack.json
      - uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999
        with:
          subject-path: skills.lock.json
      - uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999
        with:
          subject-path: dist/*.tgz
      - run: npm publish dist/*.tgz --provenance --access public
